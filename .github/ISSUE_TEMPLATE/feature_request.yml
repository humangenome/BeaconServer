name: Feature request
description: Suggest a new capability or behavior for Beacon
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What are you trying to do that Beacon doesn't currently let you do?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        Describe the behavior you'd like. If you have a wire-format or protocol implication, link the section of `protocol/` you'd touch.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today? Why aren't they sufficient?
